<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Audiovisual — Inglês da Helena 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf6ee; --paper-deep: #f3ecd9; --ink: #1f2742; --ink-soft: #4a5374;
    --coral: #ee6c4d; --coral-deep: #d24f30; --teal: #2d6a7a; --teal-soft: #5b9aab;
    --gold: #d4a35a; --rose: #e8b4b8; --line: #c9bfaa; --highlight: #fff3a8;
    --ok: #4ea862; --ok-soft: #c9e8d2;
    --err: #d24f30; --err-soft: #ffd9cd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Outfit", sans-serif; background: var(--paper); color: var(--ink);
    min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(238, 108, 77, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(45, 106, 122, 0.06) 0%, transparent 40%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.15 0 0 0 0 0.25 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: linear-gradient(to bottom, transparent 0, transparent 39px, rgba(45, 106, 122, 0.06) 39px, rgba(45, 106, 122, 0.06) 40px);
    background-size: 100% 40px; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 28px 18px 80px; }
  header { text-align: center; margin-bottom: 28px; }
  .star { display: inline-block; color: var(--gold); animation: spin 8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(2rem, 5.5vw, 3.4rem); letter-spacing: -0.03em; line-height: 1; color: var(--ink);
  }
  h1 .accent { font-style: italic; color: var(--coral); font-weight: 500; }
  .subtitle {
    font-family: "Caveat", cursive; font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    color: var(--teal); margin-top: 6px; transform: rotate(-1.5deg); display: inline-block;
  }

  .card {
    background: var(--paper-deep); border: 2px solid var(--ink); border-radius: 18px;
    padding: 28px; box-shadow: 6px 6px 0 var(--ink); position: relative;
  }
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: "Fraunces", serif; font-weight: 700; font-size: 1.35rem; margin-bottom: 14px; color: var(--ink); }
  .section-title .num {
    display: inline-block; width: 30px; height: 30px; border-radius: 50%;
    background: var(--coral); color: var(--paper); text-align: center; line-height: 30px;
    font-size: 0.95rem; margin-right: 10px; font-family: "Outfit", sans-serif; font-weight: 700;
  }

  .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .opt-btn {
    padding: 20px; background: var(--paper); border: 2px solid var(--ink); border-radius: 14px;
    cursor: pointer; font-family: "Outfit", sans-serif; font-weight: 600; font-size: 1rem;
    text-align: left; transition: all 0.2s ease; box-shadow: 4px 4px 0 var(--ink); color: var(--ink);
  }
  .opt-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .opt-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .opt-btn.selected { background: var(--coral); color: var(--paper); }
  .opt-btn .icon { font-size: 1.7rem; display: block; margin-bottom: 6px; }
  .opt-btn .label { font-family: "Fraunces", serif; font-weight: 700; font-size: 1.15rem; display: block; margin-bottom: 4px; }
  .opt-btn .desc { font-size: 0.85rem; color: var(--ink-soft); font-weight: 400; }
  .opt-btn.selected .desc { color: rgba(255,255,255,0.85); }

  .start-btn {
    margin-top: 16px; padding: 16px 28px; background: var(--coral); color: var(--paper);
    border: 2px solid var(--ink); border-radius: 12px; font-family: "Fraunces", serif;
    font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px;
  }
  .start-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .start-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }

  .ghost-btn {
    padding: 12px 22px; background: var(--paper-deep); color: var(--ink);
    border: 2px solid var(--ink); border-radius: 10px; font-family: "Outfit", sans-serif;
    font-weight: 600; cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.15s ease;
  }
  .ghost-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }

  /* === HUD ===*/
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px; margin-bottom: 14px;
  }
  .hud-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .hud-chip {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 999px;
    padding: 8px 16px; font-family: "Outfit", sans-serif; font-weight: 600;
    font-size: 0.95rem; box-shadow: 2px 2px 0 var(--ink);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hud-chip .ico { font-size: 1.05rem; }
  .hud-chip strong { color: var(--coral); font-family: "Fraunces", serif; font-weight: 700; }

  .progress-wrap {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 10px;
    padding: 4px; box-shadow: 3px 3px 0 var(--ink); margin-bottom: 22px;
  }
  .progress-bar { height: 10px; background: var(--coral); border-radius: 6px; width: 0%; transition: width 0.4s ease; }

  /* === Pergunta === */
  .stem {
    text-align: center; padding: 32px 18px; background: var(--paper);
    border: 2px solid var(--ink); border-radius: 14px;
    box-shadow: 4px 4px 0 var(--ink); margin-bottom: 18px;
  }
  .stem .label-mode {
    font-family: "Caveat", cursive; font-size: 1.3rem; color: var(--teal); margin-bottom: 6px;
  }
  .stem .audio-block {
    display: flex; align-items: center; justify-content: center; gap: 14px; margin: 8px 0 4px;
  }
  .play-big {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--coral); color: var(--paper);
    border: 3px solid var(--ink); cursor: pointer;
    font-size: 2.4rem; box-shadow: 5px 5px 0 var(--ink);
    transition: all 0.15s ease;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .play-big:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
  .play-big:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0 var(--ink); }
  .play-big.pulsing { animation: pulse 1.2s ease infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  .stem .emoji-big {
    font-size: clamp(4.5rem, 16vw, 7rem); line-height: 1; margin: 6px 0;
  }
  .stem .word-big {
    font-family: "Fraunces", serif; font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--ink); margin-top: 6px;
  }
  .stem .replay-hint {
    font-family: "Caveat", cursive; font-size: 1.1rem; color: var(--ink-soft); margin-top: 10px;
  }

  /* === Opções === */
  .answers {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  }
  @media (max-width: 480px) { .answers { grid-template-columns: 1fr; } }

  .ans-btn {
    background: var(--paper); border: 2px solid var(--ink);
    border-radius: 14px; padding: 18px 14px; cursor: pointer;
    font-family: "Outfit", sans-serif; font-weight: 600; color: var(--ink);
    box-shadow: 4px 4px 0 var(--ink); transition: all 0.15s ease;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; min-height: 110px;
  }
  .ans-btn:hover:not([disabled]) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .ans-btn:active:not([disabled]) { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .ans-btn[disabled] { cursor: default; opacity: 0.85; }

  .ans-btn .emoji-ans { font-size: clamp(2.4rem, 8vw, 3.6rem); line-height: 1; }
  .ans-btn .word-ans  { font-family: "Fraunces", serif; font-weight: 700; font-size: clamp(1.05rem, 3vw, 1.4rem); }

  .ans-btn.correct { background: var(--ok-soft); border-color: var(--ok); box-shadow: 4px 4px 0 var(--ok); animation: matchPop 0.5s ease; }
  @keyframes matchPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .ans-btn.wrong { background: var(--err-soft); border-color: var(--err); box-shadow: 4px 4px 0 var(--err); animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* === Feedback === */
  .feedback {
    margin-top: 14px; padding: 14px 18px; border-radius: 12px;
    font-family: "Outfit", sans-serif; font-size: 1rem;
    border: 2px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.3s ease; }
  .feedback.ok  { background: var(--ok-soft); }
  .feedback.bad { background: var(--err-soft); }
  .feedback strong { color: var(--coral-deep); }
  .feedback .pt { font-family: "Caveat", cursive; font-size: 1.2rem; color: var(--teal); margin-top: 4px; display: block; }

  .next-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }

  /* === Final === */
  .final-card { text-align: center; padding: 44px 28px; background: linear-gradient(135deg, var(--paper-deep) 0%, #fff3df 100%); }
  .final-card .celebration {
    font-family: "Caveat", cursive; font-size: 2rem; color: var(--coral);
    margin-bottom: 12px; animation: wiggle 2s ease infinite;
  }
  @keyframes wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
  .final-card .resultado {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(2.4rem, 6vw, 3.6rem); color: var(--teal);
    margin: 14px 0; letter-spacing: -0.02em;
  }
  .final-stats {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px 0 24px;
  }
  .final-stat {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 12px;
    padding: 14px 18px; box-shadow: 3px 3px 0 var(--ink); min-width: 110px;
  }
  .final-stat .lbl { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 4px; }
  .final-stat .val { font-family: "Fraunces", serif; font-weight: 800; font-size: 1.6rem; color: var(--coral); }

  .review-list {
    text-align: left; background: var(--paper); border: 2px solid var(--ink); border-radius: 12px;
    box-shadow: 3px 3px 0 var(--ink); padding: 16px; margin: 0 auto 18px; max-width: 540px;
  }
  .review-list h3 { font-family: "Fraunces", serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; color: var(--ink); }
  .review-list ul { list-style: none; padding: 0; }
  .review-list li {
    padding: 8px 6px; border-bottom: 1px dashed var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .review-list li:last-child { border-bottom: none; }
  .review-list .em { font-size: 1.6rem; }
  .review-list .en { font-family: "Fraunces", serif; font-weight: 700; color: var(--coral); }
  .review-list .pt { font-family: "Caveat", cursive; color: var(--teal); margin-left: 6px; }
  .review-list button {
    margin-left: auto; background: transparent; border: 2px solid var(--ink-soft);
    color: var(--ink-soft); border-radius: 999px; padding: 4px 10px; font-size: 0.85rem;
    cursor: pointer;
  }
  .review-list button:hover { border-color: var(--coral); color: var(--coral); }

  /* === Confete === */
  .confete {
    position: fixed; width: 12px; height: 12px; pointer-events: none; z-index: 100;
    border-radius: 2px; animation: cair 3s ease-out forwards;
  }
  @keyframes cair {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* === Top bar === */
  .icon-btn {
    background: var(--paper); border: 2px solid var(--ink-soft);
    color: var(--ink-soft); width: 42px; height: 42px;
    border-radius: 50%; cursor: pointer; font-size: 1.2rem;
    transition: all 0.2s ease; box-shadow: 2px 2px 0 var(--ink-soft);
  }
  .icon-btn:hover { border-color: var(--coral); color: var(--coral); transform: translate(-1px, -1px); }
  .sound-toggle { position: fixed; top: 18px; right: 18px; z-index: 50; }

  @media (max-width: 600px) {
    .app { padding: 18px 12px 60px; }
    .card { padding: 20px 16px; }
    .stem { padding: 22px 12px; }
    .play-big { width: 72px; height: 72px; font-size: 1.9rem; }
    .ans-btn { min-height: 90px; padding: 14px 10px; }
  }
</style>
</head>
<body>

<button id="soundToggle" class="icon-btn sound-toggle" aria-label="Som">🔊</button>

<div class="app">

  <header>
    <h1><span class="star">★</span> Quiz <span class="accent">Audiovisual</span></h1>
    <div class="subtitle">ouça e acerte! · pratique inglês com áudio 🎧</div>
  </header>

  <!-- TELA INICIAL -->
  <section id="screenStart" class="screen active">
    <div class="card">
      <div class="section-title"><span class="num">1</span>Escolha o vocabulário</div>
      <div class="grid-options" id="vocabGrid">
        <button class="opt-btn" data-vocab="faces">
          <span class="icon">👨‍🦰👩‍🦱</span>
          <span class="label">Faces</span>
          <span class="desc">Cabelo, olhos, barba, bigode... (18 palavras)</span>
        </button>
        <button class="opt-btn" data-vocab="weather">
          <span class="icon">☀️🌧️</span>
          <span class="label">Weather</span>
          <span class="desc">Tempo / Clima (10 palavras)</span>
        </button>
        <button class="opt-btn" data-vocab="mix">
          <span class="icon">🎲</span>
          <span class="label">Misturado</span>
          <span class="desc">Tudo junto (28 palavras)</span>
        </button>
      </div>

      <div class="section-title"><span class="num">2</span>Escolha o modo de jogo</div>
      <div class="grid-options" id="modeGrid">
        <button class="opt-btn" data-mode="listen">
          <span class="icon">🎧</span>
          <span class="label">Ouça e escolha a imagem</span>
          <span class="desc">A palavra é falada em inglês — clique no emoji certo</span>
        </button>
        <button class="opt-btn" data-mode="see">
          <span class="icon">👀</span>
          <span class="label">Veja e escolha a palavra</span>
          <span class="desc">Aparece o emoji — clique na palavra em inglês certa</span>
        </button>
        <button class="opt-btn" data-mode="both">
          <span class="icon">🔀</span>
          <span class="label">Misto</span>
          <span class="desc">Mistura os dois modos</span>
        </button>
      </div>

      <button id="btnStart" class="start-btn">Começar quiz →</button>
    </div>
  </section>

  <!-- TELA DO QUIZ -->
  <section id="screenGame" class="screen">
    <div class="card">
      <div class="hud">
        <div class="hud-stats">
          <span class="hud-chip"><span class="ico">📋</span><strong id="hudIdx">1</strong>/<span id="hudTotal">10</span></span>
          <span class="hud-chip"><span class="ico">✅</span><strong id="hudOk">0</strong> acertos</span>
          <span class="hud-chip"><span class="ico">❌</span><strong id="hudErr">0</strong> erros</span>
        </div>
        <div class="actions">
          <button id="btnBack" class="ghost-btn">‹ Trocar</button>
        </div>
      </div>

      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>

      <div id="stem" class="stem"></div>

      <div id="answers" class="answers"></div>

      <div id="feedback" class="feedback"></div>

      <div class="next-row">
        <button id="btnNext" class="start-btn" style="display:none">Próxima →</button>
      </div>
    </div>
  </section>

  <!-- TELA FINAL -->
  <section id="screenFinal" class="screen">
    <div class="card final-card">
      <div class="celebration" id="finalCelebration">Mandou bem, Helena! 🎉</div>
      <div class="resultado" id="finalScore">10/10</div>
      <div class="final-stats">
        <div class="final-stat"><div class="lbl">Acertos</div><div class="val" id="finalOk">0</div></div>
        <div class="final-stat"><div class="lbl">Erros</div><div class="val" id="finalErr">0</div></div>
        <div class="final-stat"><div class="lbl">% acerto</div><div class="val" id="finalPct">0%</div></div>
      </div>

      <div id="reviewBox" class="review-list" style="display:none">
        <h3>📚 Palavras para revisar:</h3>
        <ul id="reviewList"></ul>
      </div>

      <div class="actions" style="justify-content:center; display:flex; gap:10px; flex-wrap:wrap">
        <button id="btnPlayAgain" class="start-btn">Nova rodada ↻</button>
        <button id="btnChange" class="ghost-btn">Trocar vocabulário</button>
      </div>
    </div>
  </section>

</div>

<script>
// ============================================================
// VOCABULÁRIO
// ============================================================
const VOCAB_FACES = [
  { en: 'black',       pt: 'preto (cabelo)',     emoji: '⚫' },
  { en: 'brown',       pt: 'castanho (cabelo)',  emoji: '🟫' },
  { en: 'blond',       pt: 'loiro',              emoji: '👱' },
  { en: 'red',         pt: 'ruivo',              emoji: '👨‍🦰' },
  { en: 'grey',        pt: 'grisalho',           emoji: '👴' },
  { en: 'bald',        pt: 'careca',             emoji: '👨‍🦲' },
  { en: 'straight',    pt: 'liso',               emoji: '➖' },
  { en: 'curly',       pt: 'cacheado',           emoji: '👩‍🦱' },
  { en: 'spiky',       pt: 'espetado',           emoji: '🦔' },
  { en: 'long',        pt: 'comprido',           emoji: '👩' },
  { en: 'short',       pt: 'curto',              emoji: '✂️' },
  { en: 'moustache',   pt: 'bigode',             emoji: '👨' },
  { en: 'beard',       pt: 'barba',              emoji: '🧔' },
  { en: 'brown eyes',  pt: 'olhos castanhos',    emoji: '🟤' },
  { en: 'blue eyes',   pt: 'olhos azuis',        emoji: '🔵' },
  { en: 'green eyes',  pt: 'olhos verdes',       emoji: '🟢' },
  { en: 'slim',        pt: 'magro(a)',           emoji: '🏃' },
  { en: 'chubby',      pt: 'gordinho(a)',        emoji: '🧸' },
];
const VOCAB_WEATHER = [
  { en: 'Sunny',         pt: 'Ensolarado',                emoji: '☀️' },
  { en: 'Mostly sunny',  pt: 'Quase todo ensolarado',     emoji: '🌤️' },
  { en: 'Cloudy',        pt: 'Nublado',                   emoji: '☁️' },
  { en: 'Partly cloudy', pt: 'Parcialmente nublado',      emoji: '⛅' },
  { en: 'Rainy',         pt: 'Chuvoso',                   emoji: '🌧️' },
  { en: 'Windy',         pt: 'Ventando',                  emoji: '💨' },
  { en: 'Snowy',         pt: 'Nevando',                   emoji: '❄️' },
  { en: 'Hot',           pt: 'Quente',                    emoji: '🥵' },
  { en: 'Cold',          pt: 'Frio',                      emoji: '🥶' },
  { en: 'Stormy',        pt: 'Tempestade',                emoji: '⛈️' },
];

// ============================================================
// SOM (Web Audio + Web Speech)
// ============================================================
let somAtivo = true;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return audioCtx;
}
function tocarTom(freq, duracao = 0.1, volume = 0.05, tipo = 'sine') {
  if (!somAtivo) return;
  const ctx = getAudio(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = tipo; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duracao);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duracao);
}
function tocarClique() { tocarTom(660, 0.06, 0.03, 'triangle'); }
function tocarErro()   { tocarTom(180, 0.25, 0.06, 'sawtooth'); }
function tocarAcerto() {
  if (!somAtivo) return;
  setTimeout(() => tocarTom(659, 0.12, 0.06), 0);
  setTimeout(() => tocarTom(880, 0.16, 0.06), 110);
}
function tocarSucesso() {
  if (!somAtivo) return;
  setTimeout(() => tocarTom(523, 0.15, 0.06), 0);
  setTimeout(() => tocarTom(659, 0.15, 0.06), 150);
  setTimeout(() => tocarTom(784, 0.25, 0.08), 300);
  setTimeout(() => tocarTom(1047, 0.4, 0.08), 500);
}

let englishVoice = null;
function loadVoices() {
  const all = (window.speechSynthesis && speechSynthesis.getVoices()) || [];
  englishVoice = all.find(v => /en[-_]US/i.test(v.lang)) ||
                 all.find(v => /en[-_]GB/i.test(v.lang)) ||
                 all.find(v => /^en/i.test(v.lang)) ||
                 null;
}
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function falarIngles(texto, taxa = 0.85) {
  if (!somAtivo || !texto) return;
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'en-US'; u.rate = taxa; u.pitch = 1.0;
    if (englishVoice) u.voice = englishVoice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

const cores = ['#ee6c4d', '#2d6a7a', '#d4a35a', '#e8b4b8', '#5b9aab', '#f7c46c'];
function lancarConfete(qtd = 60) {
  for (let i = 0; i < qtd; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = cores[Math.floor(Math.random() * cores.length)];
      c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 25);
  }
}

// ============================================================
// ESTADO
// ============================================================
const TOTAL_RODADA = 10;
const estado = {
  vocab: null,  // 'faces' | 'weather' | 'mix'
  mode:  null,  // 'listen' | 'see' | 'both'
  perguntas: [],
  idx: 0,
  ok: 0,
  err: 0,
  errados: [],   // { en, pt, emoji }
  respondida: false,
};

function getVocabList(key) {
  if (key === 'faces')   return VOCAB_FACES.slice();
  if (key === 'weather') return VOCAB_WEATHER.slice();
  return VOCAB_FACES.concat(VOCAB_WEATHER);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// SETUP DOS SELETORES
// ============================================================
function setupSelectors() {
  document.querySelectorAll('#vocabGrid .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tocarClique();
      document.querySelectorAll('#vocabGrid .opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      estado.vocab = btn.dataset.vocab;
    });
  });
  document.querySelectorAll('#modeGrid .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tocarClique();
      document.querySelectorAll('#modeGrid .opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      estado.mode = btn.dataset.mode;
    });
  });
  // Pré-seleção
  document.querySelector('#vocabGrid .opt-btn[data-vocab="faces"]').click();
  document.querySelector('#modeGrid .opt-btn[data-mode="listen"]').click();
}

// ============================================================
// MONTAR PERGUNTAS
// ============================================================
function montarPerguntas() {
  const lista = shuffle(getVocabList(estado.vocab));
  const total = Math.min(TOTAL_RODADA, lista.length);
  const ativos = lista.slice(0, total);
  // pool grande para distratores
  const todos = getVocabList(estado.vocab);

  const perguntas = ativos.map(item => {
    const distratores = shuffle(todos.filter(x => x.en !== item.en)).slice(0, 3);
    const opcoes = shuffle([item, ...distratores]);
    let modo = estado.mode;
    if (modo === 'both') modo = Math.random() < 0.5 ? 'listen' : 'see';
    return { correta: item, opcoes, modo };
  });
  estado.perguntas = perguntas;
}

// ============================================================
// RENDERIZAR PERGUNTA
// ============================================================
function renderPergunta() {
  estado.respondida = false;
  const p = estado.perguntas[estado.idx];
  document.getElementById('hudIdx').textContent  = String(estado.idx + 1);
  document.getElementById('hudTotal').textContent = String(estado.perguntas.length);
  document.getElementById('hudOk').textContent   = String(estado.ok);
  document.getElementById('hudErr').textContent  = String(estado.err);
  document.getElementById('progressBar').style.width =
    ((estado.idx) / estado.perguntas.length * 100) + '%';

  const stem = document.getElementById('stem');
  if (p.modo === 'listen') {
    stem.innerHTML = `
      <div class="label-mode">Ouça a palavra em inglês 🎧</div>
      <div class="audio-block">
        <button class="play-big pulsing" id="btnPlay" aria-label="Tocar áudio">🔊</button>
      </div>
      <div class="replay-hint">clique no ícone para ouvir de novo</div>
    `;
    setTimeout(() => falarIngles(p.correta.en), 350);
    document.getElementById('btnPlay').addEventListener('click', () => {
      tocarClique();
      falarIngles(p.correta.en);
    });
  } else {
    // 'see'
    stem.innerHTML = `
      <div class="label-mode">Que palavra em inglês representa isto? 👀</div>
      <div class="emoji-big">${p.correta.emoji}</div>
      <div class="replay-hint">${p.correta.pt}</div>
    `;
  }

  // Opções
  const wrap = document.getElementById('answers');
  wrap.innerHTML = '';
  for (const op of p.opcoes) {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    if (p.modo === 'listen') {
      // mostra emoji (precisa identificar qual emoji corresponde)
      btn.innerHTML = `<div class="emoji-ans">${op.emoji}</div>`;
      btn.setAttribute('aria-label', op.en);
    } else {
      // mostra palavra
      btn.innerHTML = `<div class="word-ans">${op.en}</div>`;
    }
    btn.addEventListener('click', () => responder(op, btn));
    wrap.appendChild(btn);
  }

  // Reset feedback / next
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('btnNext').style.display = 'none';
}

// ============================================================
// RESPONDER
// ============================================================
function responder(op, btnClicado) {
  if (estado.respondida) return;
  estado.respondida = true;
  const p = estado.perguntas[estado.idx];
  const acertou = (op.en === p.correta.en);

  // Desabilita todos
  document.querySelectorAll('#answers .ans-btn').forEach(b => b.setAttribute('disabled', 'true'));
  // Marcar a correta
  document.querySelectorAll('#answers .ans-btn').forEach(b => {
    const lbl = b.querySelector('.word-ans')?.textContent || b.getAttribute('aria-label') || '';
    if (lbl === p.correta.en) b.classList.add('correct');
  });
  if (!acertou) btnClicado.classList.add('wrong');

  const fb = document.getElementById('feedback');
  if (acertou) {
    estado.ok++;
    tocarAcerto();
    lancarConfete(20);
    fb.className = 'feedback show ok';
    fb.innerHTML = `<strong>✅ Acertou!</strong> <span class="pt">${p.correta.en} = ${p.correta.pt}</span>`;
    falarIngles(p.correta.en);
  } else {
    estado.err++;
    estado.errados.push({ en: p.correta.en, pt: p.correta.pt, emoji: p.correta.emoji });
    tocarErro();
    fb.className = 'feedback show bad';
    fb.innerHTML = `<strong>❌ Quase!</strong> A resposta certa é <strong>${p.correta.en}</strong> ${p.correta.emoji}<span class="pt">tradução: ${p.correta.pt}</span>`;
    setTimeout(() => falarIngles(p.correta.en), 250);
  }

  document.getElementById('hudOk').textContent  = String(estado.ok);
  document.getElementById('hudErr').textContent = String(estado.err);

  // Mostra próxima
  const btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'inline-flex';
  btnNext.textContent = (estado.idx + 1 >= estado.perguntas.length) ? 'Ver resultado 🏁' : 'Próxima →';
}

// ============================================================
// FINAL
// ============================================================
function finalizar() {
  const total = estado.perguntas.length;
  const pct = Math.round((estado.ok / total) * 100);
  document.getElementById('finalScore').textContent = `${estado.ok} / ${total}`;
  document.getElementById('finalOk').textContent  = String(estado.ok);
  document.getElementById('finalErr').textContent = String(estado.err);
  document.getElementById('finalPct').textContent = pct + '%';

  const cel = document.getElementById('finalCelebration');
  if (pct === 100)      cel.textContent = 'Perfeito, Helena! 🌟 Tudo certo!';
  else if (pct >= 80)   cel.textContent = 'Mandou muito bem, Helena! 🎉';
  else if (pct >= 60)   cel.textContent = 'Boa, Helena! Continua praticando 💪';
  else                  cel.textContent = 'Vamos revisar e tentar de novo, Helena! 📚';

  // Lista de revisão
  const box = document.getElementById('reviewBox');
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  if (estado.errados.length > 0) {
    box.style.display = 'block';
    for (const w of estado.errados) {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="em">${w.emoji}</span>
        <span><span class="en">${w.en}</span><span class="pt">— ${w.pt}</span></span>
        <button type="button" aria-label="Ouvir">🔊 ouvir</button>
      `;
      li.querySelector('button').addEventListener('click', () => {
        tocarClique();
        falarIngles(w.en);
      });
      list.appendChild(li);
    }
  } else {
    box.style.display = 'none';
  }

  showScreen('screenFinal');
  if (pct >= 80) {
    tocarSucesso();
    lancarConfete(80);
  } else {
    tocarAcerto();
  }
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function iniciarRodada() {
  if (!estado.vocab || !estado.mode) return;
  estado.idx = 0;
  estado.ok = 0;
  estado.err = 0;
  estado.errados = [];
  montarPerguntas();
  showScreen('screenGame');
  renderPergunta();
}

// ============================================================
// BIND
// ============================================================
document.getElementById('btnStart').addEventListener('click', () => {
  tocarClique();
  iniciarRodada();
});
document.getElementById('btnNext').addEventListener('click', () => {
  tocarClique();
  if (estado.idx + 1 >= estado.perguntas.length) {
    finalizar();
  } else {
    estado.idx++;
    renderPergunta();
  }
});
document.getElementById('btnBack').addEventListener('click', () => {
  tocarClique();
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  showScreen('screenStart');
});
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  tocarClique();
  iniciarRodada();
});
document.getElementById('btnChange').addEventListener('click', () => {
  tocarClique();
  showScreen('screenStart');
});

const btnSom = document.getElementById('soundToggle');
btnSom.addEventListener('click', () => {
  somAtivo = !somAtivo;
  btnSom.textContent = somAtivo ? '🔊' : '🔇';
  if (!somAtivo && 'speechSynthesis' in window) speechSynthesis.cancel();
});

// Init
setupSelectors();
</script>
