<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#5fa8d3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Super Thomas 🦸</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sky-1: #cae9f0; --sky-2: #5fa8d3;
    --grass: #7ec850; --grass-dark: #5ea838;
    --dirt: #b07a3e; --dirt-dark: #7c5026;
    --hero: #ee6c4d; --star: #fcd116;
    --ink: #1f2742; --paper: #faf6ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: "Outfit", sans-serif;
    background: linear-gradient(180deg, var(--sky-1), var(--sky-2));
    color: var(--ink);
    -webkit-user-select: none; user-select: none;
    touch-action: none;
    overscroll-behavior: none;
  }

  #game {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* Telas */
  .screen {
    position: fixed; inset: 0; z-index: 30;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 18px;
    animation: fadeIn 0.35s ease;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .panel {
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 22px;
    padding: 28px 24px;
    box-shadow: 0 6px 0 rgba(31, 39, 66, 0.18);
    text-align: center;
    max-width: 460px; width: 100%;
  }
  .title {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(2.2rem, 8vw, 3.6rem);
    line-height: 0.95; letter-spacing: -0.03em;
    color: var(--hero); text-shadow: 3px 3px 0 var(--ink);
    margin-bottom: 6px;
  }
  .title .hero {
    display: inline-block;
    animation: bounce 1.4s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }
  .subtitle {
    font-weight: 600;
    font-size: clamp(1rem, 3vw, 1.2rem);
    margin-bottom: 18px;
  }
  .instructions {
    background: rgba(126, 200, 80, 0.18);
    border: 2px dashed var(--grass-dark);
    border-radius: 14px;
    padding: 12px 14px; margin-bottom: 18px;
    font-size: clamp(0.9rem, 2.6vw, 1rem);
    line-height: 1.55; text-align: left;
  }
  .instructions div { margin: 4px 0; }
  .instructions .ico { display: inline-block; width: 1.5em; }

  .big-btn {
    display: inline-block; cursor: pointer;
    background: var(--hero); color: var(--paper);
    border: 4px solid var(--ink); border-radius: 16px;
    padding: 16px 36px;
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(1.3rem, 4.5vw, 1.8rem);
    box-shadow: 0 6px 0 var(--ink);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }

  .stat-pill {
    background: var(--paper); border: 3px solid var(--ink);
    border-radius: 999px; padding: 8px 16px;
    font-family: "Fraunces", serif; font-weight: 700;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    box-shadow: 0 3px 0 var(--ink);
    display: inline-block; margin: 4px;
  }
  .stat-pill .v { color: var(--hero); }
  .stats-row { margin: 14px 0 18px; }

  .go-emoji { font-size: clamp(3rem, 12vw, 5rem); }
  .go-title { font-family: "Fraunces", serif; font-weight: 900;
              font-size: clamp(1.7rem, 5.5vw, 2.4rem); margin: 4px 0 6px; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 10px 14px;
    z-index: 12; pointer-events: none;
    font-family: "Fraunces", serif; font-weight: 700;
  }
  .hud-side { display: flex; gap: 6px; flex-wrap: wrap; pointer-events: auto; }
  .chip {
    background: rgba(255,255,255,0.9);
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 5px 12px;
    box-shadow: 0 3px 0 var(--ink);
    font-size: clamp(0.85rem, 2.8vw, 1rem);
    line-height: 1.3;
  }
  .chip .v { color: var(--hero); }

  /* Botão grande PULAR */
  #btnJump {
    position: fixed; right: 20px; bottom: 20px;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--hero); color: var(--paper);
    border: 5px solid var(--ink);
    box-shadow: 0 6px 0 var(--ink);
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: 1.1rem; cursor: pointer;
    z-index: 15;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1;
  }
  #btnJump.pressed { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }
  #btnJump .icon { font-size: 1.8rem; margin-bottom: 4px; }

  /* Toque em qualquer área da tela */
  #tapZone {
    position: fixed; inset: 0;
    z-index: 10;
    background: transparent;
  }

  /* Botão de som */
  .sound-btn {
    position: absolute; right: 14px; top: 14px;
    width: 42px; height: 42px;
    border-radius: 50%; border: 3px solid var(--ink);
    background: rgba(255,255,255,0.85);
    font-size: 1.2rem; cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    z-index: 14;
  }

  body:not(.playing) #hud,
  body:not(.playing) #btnJump,
  body:not(.playing) #tapZone { display: none; }

  /* Confete */
  .confete {
    position: fixed; width: 12px; height: 12px;
    pointer-events: none; z-index: 100;
    border-radius: 2px;
    animation: cair 3s ease-out forwards;
  }
  @keyframes cair {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Overlay de erro (só aparece se algo crashar) */
  #errorBox {
    display: none;
    position: fixed; left: 10px; right: 10px; bottom: 10px;
    background: #ff5252; color: #fff;
    border: 3px solid #ad1f1f;
    border-radius: 12px;
    padding: 12px;
    font-family: monospace, sans-serif;
    font-size: 0.85rem;
    z-index: 200;
    max-height: 30vh; overflow: auto;
    box-shadow: 0 4px 0 #5a0000;
  }
  #errorBox.show { display: block; }
  #errorBox b { display: block; margin-bottom: 4px; }

  @media (max-width: 480px) {
    #btnJump { width: 92px; height: 92px; right: 14px; bottom: 14px; }
    #btnJump .icon { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="tapZone" aria-hidden="true"></div>

<div id="hud">
  <div class="hud-side">
    <div class="chip" id="hudLives">💖💖💖💖💖</div>
    <div class="chip">⭐ <span class="v" id="hudStars">0</span></div>
  </div>
  <div class="hud-side">
    <div class="chip">🏃 <span class="v" id="hudDist">0</span>m</div>
    <div class="chip">🏆 <span class="v" id="hudScore">0</span></div>
  </div>
</div>

<button id="btnJump" aria-label="Pular">
  <span class="icon">⬆️</span><span>PULAR</span>
</button>

<!-- Tela inicial -->
<section id="screenStart" class="screen active">
  <div class="panel" style="position:relative">
    <button class="sound-btn" id="btnSound" aria-label="Som">🔊</button>
    <div class="title">Super <span class="hero">🦸</span><br/>Thomas</div>
    <div class="subtitle">corra, pule e pegue estrelas! ⭐</div>
    <div class="instructions">
      <div><span class="ico">👆</span> Toque a tela ou aperte <strong>PULAR</strong></div>
      <div><span class="ico">⏳</span> Segure pra pular mais alto</div>
      <div><span class="ico">🍄</span> Pule em cima do bichinho pra derrotar</div>
    </div>
    <button class="big-btn" id="btnStart">Começar ▶</button>
  </div>
</section>

<!-- Tela de game over -->
<section id="screenOver" class="screen">
  <div class="panel">
    <div class="go-emoji" id="goEmoji">😵</div>
    <div class="go-title" id="goTitle">Que pena!</div>
    <div class="stats-row">
      <div class="stat-pill">🏆 <span class="v" id="goScore">0</span></div>
      <div class="stat-pill">⭐ <span class="v" id="goStars">0</span></div>
      <div class="stat-pill">🏃 <span class="v" id="goDist">0</span>m</div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">👑 Recorde <span class="v" id="goBest">0</span></div>
    </div>
    <button class="big-btn" id="btnRestart">Jogar de novo ↻</button>
  </div>
</section>

<div id="errorBox"><b>⚠ Erro:</b><span id="errorMsg"></span></div>

<script>
'use strict';

// =============================================================
// ERROR OVERLAY (mostra qualquer erro JS na tela pra debug fácil)
// =============================================================
function mostrarErro(msg) {
  try {
    const box = document.getElementById('errorBox');
    const el = document.getElementById('errorMsg');
    if (el) el.textContent = String(msg);
    if (box) box.classList.add('show');
  } catch (e) {}
}
window.addEventListener('error', (e) => {
  mostrarErro((e.message || 'erro') + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
});
window.addEventListener('unhandledrejection', (e) => {
  mostrarErro('promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

// =============================================================
// CANVAS
// =============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Dimensões reais do canvas em pixels CSS (sem DPR), atualizadas em resizeCanvas()
let CW = 800, CH = 450;

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  CW = window.innerWidth;
  CH = window.innerHeight;
  canvas.width = Math.round(CW * dpr);
  canvas.height = Math.round(CH * dpr);
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 1 unidade = 1 px CSS
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));
resizeCanvas();

// =============================================================
// PARÂMETROS DO MUNDO (em pixels CSS reais — escala automaticamente)
// =============================================================
function groundY()    { return CH * 0.78; }                    // y do topo da grama
function playerSize() { return Math.max(34, Math.min(64, CH * 0.10)); }
function playerX()    { return Math.max(70, Math.min(180, CW * 0.18)); }
function obstacleH()  { return Math.max(34, Math.min(70, CH * 0.10)); }

// Pulo / gravidade — calibrados pra altura proporcional ao chão
function gravity()       { return CH * 0.0010; }   // queda suave
function jumpVel()       { return -CH * 0.022; }   // pulo médio
function jumpHoldForce() { return -CH * 0.0010; }  // efeito de segurar
function speedInit()     { return CW * 0.0035; }   // velocidade inicial baixinha
function speedCap()      { return CW * 0.0080; }   // teto de velocidade mais baixo
function speedGain()     { return CW * 0.0000004; } // acelera bem devagar
function spawnGapMin()   { return CW * 0.80; }     // mais espaço entre obstáculos

const JUMP_HOLD_MAX = 14;
const LIVES_INIT    = 5;

// =============================================================
// AUDIO
// =============================================================
let somAtivo = true;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return audioCtx;
}
function tom(freq, dur, vol, type, delay) {
  if (!somAtivo) return;
  const ax = getAudio(); if (!ax) return;
  try {
    const osc = ax.createOscillator();
    const g = ax.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    const t0 = ax.currentTime + (delay || 0);
    g.gain.setValueAtTime(vol || 0.05, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + (dur || 0.1));
    osc.connect(g); g.connect(ax.destination);
    osc.start(t0); osc.stop(t0 + (dur || 0.1));
  } catch (e) {}
}
function somPulo()    { tom(680, 0.10, 0.06, 'square', 0); tom(900, 0.08, 0.04, 'square', 0.05); }
function somEstrela() { tom(1000, 0.08, 0.06, 'triangle', 0); tom(1320, 0.12, 0.06, 'triangle', 0.06); }
function somDano()    { tom(180, 0.25, 0.08, 'sawtooth', 0); tom(120, 0.30, 0.06, 'sawtooth', 0.08); }
function somStomp()   { tom(420, 0.07, 0.05, 'square', 0); tom(640, 0.10, 0.05, 'triangle', 0.05); }
function somGameOver() {
  tom(523, 0.18, 0.07, 'square', 0);
  tom(440, 0.18, 0.07, 'square', 0.18);
  tom(330, 0.30, 0.08, 'square', 0.36);
  tom(220, 0.50, 0.08, 'sawtooth', 0.66);
}
function somVitoria() {
  tom(523, 0.12, 0.07, 'square', 0);
  tom(659, 0.12, 0.07, 'square', 0.12);
  tom(784, 0.12, 0.07, 'square', 0.24);
  tom(1047, 0.30, 0.09, 'square', 0.36);
}

const COR_CONFETE = ['#ee6c4d', '#fcd116', '#7ec850', '#5fa8d3', '#e8b4b8'];
function lancarConfete(qtd) {
  qtd = qtd || 40;
  for (let i = 0; i < qtd; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = COR_CONFETE[Math.floor(Math.random() * COR_CONFETE.length)];
      c.style.animationDuration = (2 + Math.random() * 1.2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 30);
  }
}

// =============================================================
// ESTADO
// =============================================================
const state = {
  running: false,
  player: null,
  obstacles: [],
  enemies: [],
  stars: [],
  particles: [],
  speed: 0,
  distance: 0,
  starsCount: 0,
  score: 0,
  lastSpawnX: 0,
  best: 0,
  clouds: [],
  trees: [],
};
try {
  state.best = parseInt(localStorage.getItem('superThomasBest') || '0', 10) || 0;
} catch (e) {}

function novoPlayer() {
  const sz = playerSize();
  return {
    x: playerX(),
    y: groundY() - sz,
    w: sz * 0.82,
    h: sz,
    vy: 0,
    onGround: true,
    jumping: false,
    holdFrames: 0,
    invuln: 0,
    lives: LIVES_INIT,
    runFrame: 0,
  };
}

function resetState() {
  state.player = novoPlayer();
  state.obstacles = [];
  state.enemies = [];
  state.stars = [];
  state.particles = [];
  state.speed = speedInit();
  state.distance = 0;
  state.starsCount = 0;
  state.score = 0;
  state.lastSpawnX = 0;
  state.clouds = [];
  state.trees = [];
  for (let i = 0; i < 6; i++) {
    state.clouds.push({
      x: Math.random() * CW,
      y: Math.random() * (groundY() * 0.45) + 30,
      s: 0.7 + Math.random() * 0.6,
      sp: 0.2 + Math.random() * 0.4
    });
  }
  for (let i = 0; i < 4; i++) {
    state.trees.push({
      x: Math.random() * CW,
      scale: 0.9 + Math.random() * 0.4
    });
  }
}

// =============================================================
// SPAWN
// =============================================================
function spawnar() {
  const minGap = spawnGapMin() + state.speed * 22;
  if (state.distance - state.lastSpawnX < minGap) return;

  const r = Math.random();
  const baseX = CW + 60;
  const obs = obstacleH();
  const gy = groundY();

  if (r < 0.25) {
    // caixa baixa fácil de pular
    state.obstacles.push({ x: baseX, y: gy - obs, w: obs * 1.0, h: obs, type: 'box' });
  } else if (r < 0.40) {
    // cacto baixo
    state.obstacles.push({ x: baseX, y: gy - obs, w: obs * 0.85, h: obs, type: 'cactus' });
  } else if (r < 0.55) {
    // inimigo (sempre Goomba, mais fácil de identificar pra criança)
    state.enemies.push({ x: baseX, y: gy - obs * 0.95, w: obs * 0.95, h: obs * 0.95, type: 'goomba', vy: 0, alive: true, walk: 0 });
  } else {
    const qtd = 3 + Math.floor(Math.random() * 3);
    const startY = gy - obs * 2.6;
    const stepX = obs * 1.2;
    for (let i = 0; i < qtd; i++) {
      const off = Math.sin((i / Math.max(1, qtd - 1)) * Math.PI) * obs * 1.4;
      state.stars.push({ x: baseX + i * stepX, y: startY - off, w: obs * 0.7, h: obs * 0.7, taken: false, spin: Math.random() * Math.PI * 2 });
    }
  }
  state.lastSpawnX = state.distance;
}

// =============================================================
// INPUT
// =============================================================
let touchHeld = false;
function tentarPular() {
  if (!state.running) return;
  const p = state.player;
  if (!p) return;
  if (p.onGround) {
    p.vy = jumpVel();
    p.onGround = false;
    p.jumping = true;
    p.holdFrames = JUMP_HOLD_MAX;
    somPulo();
  }
}

// =============================================================
// UPDATE
// =============================================================
function update() {
  if (!state.running) return;
  const p = state.player;
  if (!p) return;

  // pulo variável
  if (touchHeld && p.jumping && p.holdFrames > 0 && p.vy < 0) {
    p.vy += jumpHoldForce();
    p.holdFrames--;
  }
  p.vy += gravity();
  p.y += p.vy;

  // chão
  const gy = groundY();
  if (p.y + p.h >= gy) {
    p.y = gy - p.h;
    p.vy = 0;
    p.onGround = true;
    p.jumping = false;
  }
  if (p.onGround) p.runFrame = (p.runFrame + 0.25) % 4;
  if (p.invuln > 0) p.invuln--;

  // mundo
  state.distance += state.speed;
  if (state.speed < speedCap()) state.speed += speedGain();

  for (let i = 0; i < state.obstacles.length; i++) state.obstacles[i].x -= state.speed;
  for (let i = 0; i < state.enemies.length; i++) {
    const e = state.enemies[i];
    if (e.alive) { e.x -= state.speed; e.walk += 0.18; } // anda na velocidade do mundo (não vem mais rápido)
    else { e.x -= state.speed * 0.8; e.vy += gravity(); e.y += e.vy; }
  }
  for (let i = 0; i < state.stars.length; i++) {
    state.stars[i].x -= state.speed;
    state.stars[i].spin += 0.12;
  }
  for (let i = 0; i < state.clouds.length; i++) {
    const c = state.clouds[i];
    c.x -= c.sp;
    if (c.x < -100) {
      c.x = CW + Math.random() * 200;
      c.y = Math.random() * (groundY() * 0.45) + 30;
      c.s = 0.7 + Math.random() * 0.6;
    }
  }
  for (let i = 0; i < state.trees.length; i++) {
    const t = state.trees[i];
    t.x -= state.speed * 0.55;
    if (t.x < -80) { t.x = CW + Math.random() * 200; t.scale = 0.9 + Math.random() * 0.4; }
  }

  // remove off-screen
  state.obstacles = state.obstacles.filter(o => o.x + o.w > -50);
  state.enemies   = state.enemies.filter(e => e.x + e.w > -50 && e.y < CH + 200);
  state.stars     = state.stars.filter(s => s.x + s.w > -50 && !s.taken);

  spawnar();
  colisoes();

  // partículas
  for (let i = 0; i < state.particles.length; i++) {
    const pa = state.particles[i];
    pa.x += pa.vx; pa.y += pa.vy;
    pa.vy += 0.3; pa.life--;
  }
  state.particles = state.particles.filter(pa => pa.life > 0);

  state.score = Math.floor(state.distance / 6) + state.starsCount * 25;
  atualizarHUD();
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function colisoes() {
  const p = state.player;
  if (!p) return;
  const pad = p.w * 0.1;
  const pBox = { x: p.x + pad, y: p.y + pad, w: p.w - pad * 2, h: p.h - pad * 2 };

  // estrelas
  for (let i = 0; i < state.stars.length; i++) {
    const s = state.stars[i];
    if (s.taken) continue;
    if (rectOverlap(pBox, s)) {
      s.taken = true;
      state.starsCount++;
      somEstrela();
      for (let k = 0; k < 6; k++) {
        state.particles.push({
          x: s.x + s.w / 2, y: s.y + s.h / 2,
          vx: (Math.random() - 0.5) * 4, vy: -2 - Math.random() * 3,
          life: 22, emoji: '✨'
        });
      }
    }
  }

  if (p.invuln > 0) return;

  // inimigos
  for (let i = 0; i < state.enemies.length; i++) {
    const e = state.enemies[i];
    if (!e.alive) continue;
    if (rectOverlap(pBox, e)) {
      const playerBottom = p.y + p.h;
      if (p.vy > 0 && playerBottom < e.y + e.h * 0.6) {
        e.alive = false;
        e.vy = jumpVel() * 0.5;
        somStomp();
        p.vy = jumpVel() * 0.6;
        state.score += 50;
      } else {
        sofrerDano();
        return;
      }
    }
  }

  // obstáculos
  for (let i = 0; i < state.obstacles.length; i++) {
    if (rectOverlap(pBox, state.obstacles[i])) {
      sofrerDano();
      return;
    }
  }
}

function sofrerDano() {
  const p = state.player;
  p.lives--;
  p.invuln = 90;
  somDano();
  if (p.onGround) p.vy = jumpVel() * 0.6;
  if (p.lives <= 0) fimDeJogo();
}

// =============================================================
// RENDER
// =============================================================
function render() {
  const gy = groundY();

  // céu
  const sky = ctx.createLinearGradient(0, 0, 0, gy);
  sky.addColorStop(0, '#cae9f0');
  sky.addColorStop(1, '#5fa8d3');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CW, gy);

  // sol
  const sunR = Math.min(40, CH * 0.06);
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#fff3a8';
  ctx.beginPath(); ctx.arc(CW - sunR * 2.5, sunR * 2, sunR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255, 211, 0, 0.5)';
  ctx.beginPath(); ctx.arc(CW - sunR * 2.5, sunR * 2, sunR * 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // nuvens
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  for (let i = 0; i < state.clouds.length; i++) {
    const c = state.clouds[i];
    drawCloud(c.x, c.y, c.s);
  }

  // árvores
  for (let i = 0; i < state.trees.length; i++) {
    drawTree(state.trees[i].x, gy, state.trees[i].scale);
  }

  // CHÃO
  ctx.fillStyle = '#7ec850';
  ctx.fillRect(0, gy, CW, 14);
  ctx.fillStyle = '#5ea838';
  ctx.fillRect(0, gy + 14, CW, 4);
  ctx.fillStyle = '#b07a3e';
  ctx.fillRect(0, gy + 18, CW, CH - gy - 18);
  // textura terra (pontinhos)
  ctx.fillStyle = '#7c5026';
  for (let i = 0; i < 80; i++) {
    const x = (i * 73 + state.distance * -0.5) % CW;
    const dy = ((i * 23) % Math.max(40, CH - gy - 40));
    const y = gy + 30 + dy;
    ctx.fillRect(((x % CW) + CW) % CW, y, 3, 3);
  }

  // estrelas
  for (let i = 0; i < state.stars.length; i++) {
    const s = state.stars[i];
    if (s.taken) continue;
    drawStar(s.x + s.w / 2, s.y + s.h / 2, s.w / 2, s.spin);
  }

  // obstáculos
  for (let i = 0; i < state.obstacles.length; i++) drawObstacle(state.obstacles[i]);

  // inimigos
  for (let i = 0; i < state.enemies.length; i++) drawEnemy(state.enemies[i]);

  // partículas
  ctx.font = (Math.min(28, CH * 0.04)) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < state.particles.length; i++) {
    const pa = state.particles[i];
    ctx.save();
    ctx.globalAlpha = Math.max(0, pa.life / 22);
    ctx.fillText(pa.emoji, pa.x, pa.y);
    ctx.restore();
  }

  // player
  if (state.player) drawPlayer(state.player);
}

function drawCloud(x, y, s) {
  const r = 16 * s;
  ctx.beginPath();
  ctx.arc(x,         y,        r,         0, Math.PI * 2);
  ctx.arc(x + r * 1.3, y - r * 0.4, r * 1.3, 0, Math.PI * 2);
  ctx.arc(x + r * 2.6, y,        r,         0, Math.PI * 2);
  ctx.arc(x + r * 1.3, y + r * 0.5, r,      0, Math.PI * 2);
  ctx.fill();
}

function drawTree(x, gyy, scale) {
  const s = scale;
  ctx.fillStyle = '#7c5026';
  ctx.fillRect(x - 6 * s, gyy - 50 * s, 12 * s, 50 * s);
  ctx.fillStyle = '#3aa84a';
  ctx.beginPath();
  ctx.arc(x,            gyy - 60 * s, 24 * s, 0, Math.PI * 2);
  ctx.arc(x - 18 * s,   gyy - 50 * s, 20 * s, 0, Math.PI * 2);
  ctx.arc(x + 18 * s,   gyy - 50 * s, 20 * s, 0, Math.PI * 2);
  ctx.arc(x,            gyy - 40 * s, 22 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawStar(cx, cy, r, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.fillStyle = '#fcd116';
  ctx.strokeStyle = '#e0a500';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (Math.PI * 2 * i) / 10 - Math.PI / 2;
    const rr = i % 2 === 0 ? r : r * 0.5;
    const px = Math.cos(a) * rr;
    const py = Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.3, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawObstacle(o) {
  if (o.type === 'cactus') {
    ctx.font = (o.h * 0.95) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('🌵', o.x + o.w / 2, o.y + o.h);
  } else {
    const grad = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
    grad.addColorStop(0, '#f7b32b');
    grad.addColorStop(1, '#c97a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.strokeStyle = '#5a3210';
    ctx.lineWidth = 3;
    ctx.strokeRect(o.x + 1.5, o.y + 1.5, o.w - 3, o.h - 3);
    // rebites
    ctx.fillStyle = '#5a3210';
    const rr = 2.5;
    ctx.beginPath(); ctx.arc(o.x + 6, o.y + 6, rr, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + o.w - 6, o.y + 6, rr, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + 6, o.y + o.h - 6, rr, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + o.w - 6, o.y + o.h - 6, rr, 0, Math.PI * 2); ctx.fill();
    if (o.type === 'box') {
      ctx.fillStyle = '#fff3a8';
      ctx.font = 'bold ' + (o.h * 0.55) + 'px Fraunces, serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('?', o.x + o.w / 2, o.y + o.h / 2);
    } else {
      // tijolinhos pra caixa alta
      ctx.fillStyle = '#5a3210';
      ctx.fillRect(o.x, o.y + o.h / 2 - 1.5, o.w, 3);
    }
  }
}

function drawEnemy(e) {
  ctx.save();
  ctx.font = (e.h * 0.95) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (!e.alive) {
    ctx.translate(e.x + e.w / 2, e.y + e.h / 2);
    ctx.rotate(Math.PI);
    ctx.globalAlpha = 0.9;
    ctx.fillText(e.type === 'koopa' ? '🐢' : '🍄', 0, 0);
  } else {
    const dy = Math.sin(e.walk) * 2;
    ctx.fillText(e.type === 'koopa' ? '🐢' : '🍄', e.x + e.w / 2, e.y + e.h / 2 + dy);
  }
  ctx.restore();
}

function drawPlayer(p) {
  // flicker quando invulnerável
  if (p.invuln > 0 && Math.floor(p.invuln / 4) % 2 === 0) return;

  // Desenho proporcional ao tamanho do player. Coordenadas relativas ao centro.
  const cx = p.x + p.w / 2;
  const cy = p.y + p.h / 2;
  const u = p.h / 56; // unidade — desenho original calibrado pra h=56

  ctx.save();
  ctx.translate(cx, cy);
  if (!p.onGround) {
    const rot = Math.max(-0.25, Math.min(0.25, p.vy * 0.025));
    ctx.rotate(rot);
  } else {
    const bob = Math.sin(p.runFrame * Math.PI) * 1.5 * u;
    ctx.translate(0, bob);
  }

  // capa
  ctx.fillStyle = '#c2185b';
  ctx.beginPath();
  ctx.moveTo(-12 * u, -12 * u);
  ctx.quadraticCurveTo(-22 * u, 8 * u, -16 * u, 22 * u);
  ctx.lineTo(-2 * u, 14 * u);
  ctx.lineTo(-6 * u, -10 * u);
  ctx.closePath();
  ctx.fill();

  // corpo
  ctx.fillStyle = '#ee6c4d';
  roundRect(-16 * u, -8 * u, 28 * u, 22 * u, 6 * u); ctx.fill();

  // T no peito
  ctx.fillStyle = '#fcd116';
  ctx.font = 'bold ' + (14 * u) + 'px Fraunces, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('T', -2 * u, 3 * u);

  // pernas
  ctx.fillStyle = '#1f4f9c';
  const legSwing = p.onGround ? Math.sin(p.runFrame * Math.PI) * 6 : -4;
  roundRect(-14 * u, 14 * u, 10 * u, 14 * u, 3 * u); ctx.fill();
  ctx.save();
  ctx.translate(2 * u, 14 * u + (p.onGround ? 0 : -2 * u));
  ctx.rotate(p.onGround ? legSwing * 0.06 : -0.2);
  roundRect(-5 * u, 0, 10 * u, 14 * u, 3 * u); ctx.fill();
  ctx.restore();

  // pés
  ctx.fillStyle = '#7c5026';
  ctx.fillRect(-15 * u, 26 * u, 11 * u, 4 * u);
  ctx.fillRect(-3 * u,  26 * u, 11 * u, 4 * u);

  // cabeça
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath(); ctx.arc(-2 * u, -16 * u, 11 * u, 0, Math.PI * 2); ctx.fill();

  // cabelo
  ctx.fillStyle = '#3b2810';
  ctx.beginPath();
  ctx.arc(-2 * u, -19 * u, 11 * u, Math.PI, 0);
  ctx.lineTo(9 * u, -19 * u); ctx.lineTo(9 * u, -16 * u);
  ctx.lineTo(-13 * u, -16 * u); ctx.lineTo(-13 * u, -19 * u);
  ctx.closePath();
  ctx.fill();

  // máscara
  ctx.fillStyle = '#1f2742';
  roundRect(-11 * u, -18 * u, 18 * u, 6 * u, 2 * u); ctx.fill();

  // olhos
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-7 * u, -15 * u, 2.2 * u, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2 * u, -15 * u, 2.2 * u, 0, Math.PI * 2); ctx.fill();

  // boca
  ctx.strokeStyle = '#1f2742';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(-2 * u, -10 * u, 3 * u, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // braços
  ctx.fillStyle = '#ee6c4d';
  if (p.onGround) {
    const armSwing = Math.sin(p.runFrame * Math.PI + Math.PI) * 0.4;
    ctx.save();
    ctx.translate(-14 * u, -2 * u); ctx.rotate(armSwing);
    roundRect(-3 * u, 0, 6 * u, 14 * u, 3 * u); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(12 * u, -2 * u); ctx.rotate(-armSwing);
    roundRect(-3 * u, 0, 6 * u, 14 * u, 3 * u); ctx.fill();
    ctx.restore();
  } else {
    ctx.save();
    ctx.translate(-14 * u, -4 * u); ctx.rotate(-0.6);
    roundRect(-3 * u, 0, 6 * u, 14 * u, 3 * u); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(12 * u, -4 * u); ctx.rotate(0.6);
    roundRect(-3 * u, 0, 6 * u, 14 * u, 3 * u); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// =============================================================
// HUD
// =============================================================
function atualizarHUD() {
  const p = state.player;
  if (!p) return;
  const heart = '💖'.repeat(Math.max(0, p.lives)) + '🖤'.repeat(Math.max(0, LIVES_INIT - p.lives));
  document.getElementById('hudLives').textContent = heart;
  document.getElementById('hudStars').textContent = state.starsCount;
  document.getElementById('hudDist').textContent = Math.floor(state.distance / 6);
  document.getElementById('hudScore').textContent = state.score;
}

// =============================================================
// FLUXO
// =============================================================
function iniciarJogo() {
  resizeCanvas(); // garante que CW/CH estão atualizados
  resetState();
  state.running = true;
  document.body.classList.add('playing');
  document.getElementById('screenStart').classList.remove('active');
  document.getElementById('screenOver').classList.remove('active');
  const a = getAudio();
  if (a && a.state === 'suspended') a.resume().catch(() => {});
  atualizarHUD();
}

function fimDeJogo() {
  state.running = false;
  document.body.classList.remove('playing');
  somGameOver();

  const dist = Math.floor(state.distance / 6);
  const score = state.score;
  let novoRec = false;
  if (score > state.best) {
    state.best = score;
    try { localStorage.setItem('superThomasBest', String(state.best)); } catch (e) {}
    novoRec = true;
  }
  document.getElementById('goScore').textContent = score;
  document.getElementById('goStars').textContent = state.starsCount;
  document.getElementById('goDist').textContent = dist;
  document.getElementById('goBest').textContent = state.best;

  const goE = document.getElementById('goEmoji');
  const goT = document.getElementById('goTitle');
  if (novoRec) { goE.textContent = '🏆'; goT.textContent = 'NOVO RECORDE!'; setTimeout(() => { somVitoria(); lancarConfete(60); }, 250); }
  else if (score >= 1000) { goE.textContent = '🎉'; goT.textContent = 'Mandou bem!'; setTimeout(() => lancarConfete(30), 250); }
  else { goE.textContent = '😵'; goT.textContent = 'Que pena!'; }

  setTimeout(() => document.getElementById('screenOver').classList.add('active'), 600);
}

// =============================================================
// LOOP
// =============================================================
function loop() {
  try {
    update();
    render();
  } catch (e) {
    mostrarErro('loop: ' + (e && e.message ? e.message : e));
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =============================================================
// HANDLERS DE INPUT
// =============================================================
const btnJump = document.getElementById('btnJump');
const tapZone = document.getElementById('tapZone');

function pressar() {
  touchHeld = true;
  btnJump.classList.add('pressed');
  tentarPular();
}
function soltar() {
  touchHeld = false;
  btnJump.classList.remove('pressed');
}

function bind(el, downEvts, upEvts) {
  downEvts.forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); pressar(); }, { passive: false }));
  upEvts.forEach(ev => el.addEventListener(ev, e => { e.preventDefault(); soltar(); }, { passive: false }));
}

bind(btnJump, ['touchstart', 'mousedown'], ['touchend', 'touchcancel', 'mouseup', 'mouseleave']);
bind(tapZone, ['touchstart', 'mousedown'], ['touchend', 'touchcancel', 'mouseup']);

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault(); if (!touchHeld) pressar();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault(); soltar();
  }
});

// Botões dos menus
document.getElementById('btnStart').addEventListener('click', () => iniciarJogo());
document.getElementById('btnRestart').addEventListener('click', () => iniciarJogo());

const btnSound = document.getElementById('btnSound');
btnSound.addEventListener('click', e => {
  e.stopPropagation();
  somAtivo = !somAtivo;
  btnSound.textContent = somAtivo ? '🔊' : '🔇';
});

// previne zoom por gesto
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());
</script>
