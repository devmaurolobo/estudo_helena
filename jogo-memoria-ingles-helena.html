<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jogo da Memória — Inglês da Helena 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf6ee; --paper-deep: #f3ecd9; --ink: #1f2742; --ink-soft: #4a5374;
    --coral: #ee6c4d; --coral-deep: #d24f30; --teal: #2d6a7a; --teal-soft: #5b9aab;
    --gold: #d4a35a; --rose: #e8b4b8; --line: #c9bfaa; --highlight: #fff3a8;
    --ok: #4ea862; --ok-soft: #c9e8d2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Outfit", sans-serif; background: var(--paper); color: var(--ink);
    min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(238, 108, 77, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(45, 106, 122, 0.06) 0%, transparent 40%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.15 0 0 0 0 0.25 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: linear-gradient(to bottom, transparent 0, transparent 39px, rgba(45, 106, 122, 0.06) 39px, rgba(45, 106, 122, 0.06) 40px);
    background-size: 100% 40px; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 28px 18px 80px; }
  header { text-align: center; margin-bottom: 28px; }
  .star { display: inline-block; color: var(--gold); animation: spin 8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(2rem, 5.5vw, 3.4rem); letter-spacing: -0.03em; line-height: 1; color: var(--ink);
  }
  h1 .accent { font-style: italic; color: var(--coral); font-weight: 500; }
  .subtitle {
    font-family: "Caveat", cursive; font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    color: var(--teal); margin-top: 6px; transform: rotate(-1.5deg); display: inline-block;
  }

  .card {
    background: var(--paper-deep); border: 2px solid var(--ink); border-radius: 18px;
    padding: 28px; box-shadow: 6px 6px 0 var(--ink); position: relative;
  }
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-family: "Fraunces", serif; font-weight: 700; font-size: 1.35rem; margin-bottom: 14px; color: var(--ink); }
  .section-title .num {
    display: inline-block; width: 30px; height: 30px; border-radius: 50%;
    background: var(--coral); color: var(--paper); text-align: center; line-height: 30px;
    font-size: 0.95rem; margin-right: 10px; font-family: "Outfit", sans-serif; font-weight: 700;
  }

  .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .opt-btn {
    padding: 20px; background: var(--paper); border: 2px solid var(--ink); border-radius: 14px;
    cursor: pointer; font-family: "Outfit", sans-serif; font-weight: 600; font-size: 1rem;
    text-align: left; transition: all 0.2s ease; box-shadow: 4px 4px 0 var(--ink); color: var(--ink);
  }
  .opt-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .opt-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .opt-btn.selected { background: var(--coral); color: var(--paper); }
  .opt-btn .icon { font-size: 1.7rem; display: block; margin-bottom: 6px; }
  .opt-btn .label { font-family: "Fraunces", serif; font-weight: 700; font-size: 1.15rem; display: block; margin-bottom: 4px; }
  .opt-btn .desc { font-size: 0.85rem; color: var(--ink-soft); font-weight: 400; }
  .opt-btn.selected .desc { color: rgba(255,255,255,0.85); }

  .start-btn {
    margin-top: 16px; padding: 16px 28px; background: var(--coral); color: var(--paper);
    border: 2px solid var(--ink); border-radius: 12px; font-family: "Fraunces", serif;
    font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px;
  }
  .start-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .start-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .ghost-btn {
    padding: 12px 22px; background: var(--paper-deep); color: var(--ink);
    border: 2px solid var(--ink); border-radius: 10px; font-family: "Outfit", sans-serif;
    font-weight: 600; cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.15s ease;
  }
  .ghost-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }

  .hud {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px; margin-bottom: 18px;
  }
  .hud-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .hud-chip {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 999px;
    padding: 8px 16px; font-family: "Outfit", sans-serif; font-weight: 600;
    font-size: 0.95rem; box-shadow: 2px 2px 0 var(--ink);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hud-chip .ico { font-size: 1.05rem; }
  .hud-chip strong { color: var(--coral); font-family: "Fraunces", serif; font-weight: 700; }

  .board {
    display: grid; gap: 12px; margin: 18px 0;
    --cols: 4;
    grid-template-columns: repeat(var(--cols), 1fr);
  }
  .board.cols-3 { --cols: 3; }
  .board.cols-4 { --cols: 4; }
  .board.cols-5 { --cols: 5; }
  .board.cols-6 { --cols: 6; }

  .mcard {
    aspect-ratio: 3 / 4;
    perspective: 800px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mcard-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform-style: preserve-3d;
  }
  .mcard.flipped .mcard-inner,
  .mcard.matched .mcard-inner { transform: rotateY(180deg); }

  .mcard-face {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    border: 2px solid var(--ink); border-radius: 14px;
    box-shadow: 3px 3px 0 var(--ink);
    -webkit-backface-visibility: hidden; backface-visibility: hidden;
    padding: 6px; overflow: hidden;
  }
  .mcard-front {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-soft) 100%);
    color: var(--paper);
  }
  .mcard-front .pattern {
    font-family: "Fraunces", serif; font-weight: 900; font-size: 2.6rem;
    color: rgba(255,255,255,0.85); letter-spacing: -0.02em;
  }
  .mcard-front .hint {
    font-family: "Caveat", cursive; font-size: 1rem;
    color: rgba(255,255,255,0.75); margin-top: 4px;
  }
  .mcard-back {
    background: var(--paper);
    transform: rotateY(180deg);
  }
  .mcard.matched .mcard-back {
    background: var(--ok-soft);
    border-color: var(--ok);
    box-shadow: 3px 3px 0 var(--ok);
    animation: matchPop 0.5s ease;
  }
  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .mcard.bad .mcard-back {
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-4px); }
    75% { transform: rotateY(180deg) translateX(4px); }
  }

  .mcard .emoji {
    font-size: clamp(1.8rem, 8vw, 3.2rem);
    line-height: 1;
  }
  .mcard .word {
    font-family: "Fraunces", serif; font-weight: 700;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: var(--ink); text-align: center;
    padding: 0 4px; line-height: 1.15;
    word-break: break-word;
  }
  .mcard .pt {
    font-family: "Caveat", cursive; font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: var(--teal); margin-top: 4px;
  }
  .mcard .speaker {
    position: absolute; top: 4px; right: 4px;
    font-size: 0.9rem; opacity: 0.7;
  }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* === Tela final === */
  .final-card { text-align: center; padding: 44px 28px; background: linear-gradient(135deg, var(--paper-deep) 0%, #fff3df 100%); }
  .final-card .celebration {
    font-family: "Caveat", cursive; font-size: 2rem; color: var(--coral);
    margin-bottom: 12px; animation: wiggle 2s ease infinite;
  }
  @keyframes wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
  .final-card .resultado {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(2rem, 5vw, 3rem); color: var(--teal);
    margin: 14px 0; letter-spacing: -0.02em;
  }
  .final-stats {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px 0 24px;
  }
  .final-stat {
    background: var(--paper); border: 2px solid var(--ink); border-radius: 12px;
    padding: 14px 18px; box-shadow: 3px 3px 0 var(--ink);
    min-width: 110px;
  }
  .final-stat .lbl { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 4px; }
  .final-stat .val { font-family: "Fraunces", serif; font-weight: 800; font-size: 1.6rem; color: var(--coral); }

  /* === Confete === */
  .confete {
    position: fixed; width: 12px; height: 12px; pointer-events: none; z-index: 100;
    border-radius: 2px; animation: cair 3s ease-out forwards;
  }
  @keyframes cair {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* === Top bar buttons === */
  .icon-btn {
    background: var(--paper); border: 2px solid var(--ink-soft);
    color: var(--ink-soft); width: 42px; height: 42px;
    border-radius: 50%; cursor: pointer; font-size: 1.2rem;
    transition: all 0.2s ease; box-shadow: 2px 2px 0 var(--ink-soft);
  }
  .icon-btn:hover { border-color: var(--coral); color: var(--coral); transform: translate(-1px, -1px); }
  .sound-toggle { position: fixed; top: 18px; right: 18px; z-index: 50; }
  .home-link {
    position: fixed; top: 18px; left: 18px; z-index: 50;
    background: var(--paper); border: 2px solid var(--ink-soft);
    color: var(--ink-soft); padding: 8px 14px; border-radius: 999px;
    font-family: "Outfit", sans-serif; font-weight: 600; font-size: 0.9rem;
    text-decoration: none; box-shadow: 2px 2px 0 var(--ink-soft);
    transition: all 0.2s ease;
  }
  .home-link:hover { border-color: var(--coral); color: var(--coral); transform: translate(-1px, -1px); }

  @media (max-width: 600px) {
    .app { padding: 18px 12px 60px; }
    .card { padding: 20px 16px; }
    .board { gap: 8px; }
    .mcard-front .pattern { font-size: 1.8rem; }
    .hud-chip { padding: 6px 12px; font-size: 0.85rem; }
    .home-link { font-size: 0.8rem; padding: 6px 10px; }
  }
</style>
</head>
<body>

<button id="soundToggle" class="icon-btn sound-toggle" aria-label="Som">🔊</button>

<div class="app">

  <header>
    <h1><span class="star">★</span> <span class="accent">Jogo da</span> Memória</h1>
    <div class="subtitle">vocabulário de inglês — pares de imagem & palavra 🇬🇧</div>
  </header>

  <!-- TELA INICIAL -->
  <section id="screenStart" class="screen active">
    <div class="card">
      <div class="section-title"><span class="num">1</span>Escolha o vocabulário</div>
      <div class="grid-options" id="vocabGrid">
        <button class="opt-btn" data-vocab="faces">
          <span class="icon">👨‍🦰👩‍🦱</span>
          <span class="label">Faces</span>
          <span class="desc">Cabelo, olhos, barba, bigode... (18 palavras)</span>
        </button>
        <button class="opt-btn" data-vocab="weather">
          <span class="icon">☀️🌧️</span>
          <span class="label">Weather</span>
          <span class="desc">Tempo / Clima (10 palavras)</span>
        </button>
        <button class="opt-btn" data-vocab="mix">
          <span class="icon">🎲</span>
          <span class="label">Misturado</span>
          <span class="desc">Tudo junto (28 palavras)</span>
        </button>
      </div>

      <div class="section-title"><span class="num">2</span>Escolha a dificuldade</div>
      <div class="grid-options" id="diffGrid">
        <button class="opt-btn" data-pairs="6">
          <span class="icon">🌱</span>
          <span class="label">Fácil</span>
          <span class="desc">6 pares · 12 cartas</span>
        </button>
        <button class="opt-btn" data-pairs="8">
          <span class="icon">🔥</span>
          <span class="label">Médio</span>
          <span class="desc">8 pares · 16 cartas</span>
        </button>
        <button class="opt-btn" data-pairs="all">
          <span class="icon">🏆</span>
          <span class="label">Difícil</span>
          <span class="desc">Todos os pares</span>
        </button>
      </div>

      <button id="btnStart" class="start-btn">Começar a jogar →</button>
    </div>
  </section>

  <!-- TELA DO JOGO -->
  <section id="screenGame" class="screen">
    <div class="card">
      <div class="hud">
        <div class="hud-stats">
          <span class="hud-chip"><span class="ico">⏱️</span><strong id="hudTime">00:00</strong></span>
          <span class="hud-chip"><span class="ico">🎯</span><strong id="hudMoves">0</strong> jogadas</span>
          <span class="hud-chip"><span class="ico">✅</span><strong id="hudPairs">0</strong>/<span id="hudTotal">0</span> pares</span>
        </div>
        <div class="actions">
          <button id="btnRestart" class="ghost-btn">↻ Reiniciar</button>
          <button id="btnBack" class="ghost-btn">‹ Trocar</button>
        </div>
      </div>

      <div id="board" class="board"></div>
    </div>
  </section>

  <!-- TELA FINAL -->
  <section id="screenFinal" class="screen">
    <div class="card final-card">
      <div class="celebration">Você arrasou, Helena! 🎉</div>
      <div class="resultado" id="finalTitle">Memória completa!</div>
      <div class="final-stats">
        <div class="final-stat"><div class="lbl">Tempo</div><div class="val" id="finalTime">00:00</div></div>
        <div class="final-stat"><div class="lbl">Jogadas</div><div class="val" id="finalMoves">0</div></div>
        <div class="final-stat"><div class="lbl">Pares</div><div class="val" id="finalPairs">0</div></div>
      </div>
      <div class="actions" style="justify-content:center">
        <button id="btnPlayAgain" class="start-btn">Jogar de novo ↻</button>
        <button id="btnChange" class="ghost-btn">Trocar vocabulário</button>
      </div>
    </div>
  </section>

</div>

<script>
// ============================================================
// VOCABULÁRIO
// ============================================================
const VOCAB_FACES = [
  { en: 'black',       pt: 'preto (cabelo)',     emoji: '⚫' },
  { en: 'brown',       pt: 'castanho (cabelo)',  emoji: '🟫' },
  { en: 'blond',       pt: 'loiro',              emoji: '👱' },
  { en: 'red',         pt: 'ruivo',              emoji: '👨‍🦰' },
  { en: 'grey',        pt: 'grisalho',           emoji: '👴' },
  { en: 'bald',        pt: 'careca',             emoji: '👨‍🦲' },
  { en: 'straight',    pt: 'liso',               emoji: '➖' },
  { en: 'curly',       pt: 'cacheado',           emoji: '👩‍🦱' },
  { en: 'spiky',       pt: 'espetado',           emoji: '🦔' },
  { en: 'long',        pt: 'comprido',           emoji: '👩' },
  { en: 'short',       pt: 'curto',              emoji: '✂️' },
  { en: 'moustache',   pt: 'bigode',             emoji: '👨' },
  { en: 'beard',       pt: 'barba',              emoji: '🧔' },
  { en: 'brown eyes',  pt: 'olhos castanhos',    emoji: '🟤' },
  { en: 'blue eyes',   pt: 'olhos azuis',        emoji: '🔵' },
  { en: 'green eyes',  pt: 'olhos verdes',       emoji: '🟢' },
  { en: 'slim',        pt: 'magro(a)',           emoji: '🏃' },
  { en: 'chubby',      pt: 'gordinho(a)',        emoji: '🧸' },
];
const VOCAB_WEATHER = [
  { en: 'Sunny',         pt: 'Ensolarado',                emoji: '☀️' },
  { en: 'Mostly sunny',  pt: 'Quase todo ensolarado',     emoji: '🌤️' },
  { en: 'Cloudy',        pt: 'Nublado',                   emoji: '☁️' },
  { en: 'Partly cloudy', pt: 'Parcialmente nublado',      emoji: '⛅' },
  { en: 'Rainy',         pt: 'Chuvoso',                   emoji: '🌧️' },
  { en: 'Windy',         pt: 'Ventando',                  emoji: '💨' },
  { en: 'Snowy',         pt: 'Nevando',                   emoji: '❄️' },
  { en: 'Hot',           pt: 'Quente',                    emoji: '🥵' },
  { en: 'Cold',          pt: 'Frio',                      emoji: '🥶' },
  { en: 'Stormy',        pt: 'Tempestade',                emoji: '⛈️' },
];

// ============================================================
// SOM (Web Audio para clicks + Web Speech para inglês)
// ============================================================
let somAtivo = true;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return audioCtx;
}
function tocarTom(freq, duracao = 0.1, volume = 0.05, tipo = 'sine') {
  if (!somAtivo) return;
  const ctx = getAudio(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = tipo; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duracao);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duracao);
}
function tocarClique() { tocarTom(660, 0.06, 0.03, 'triangle'); }
function tocarErro()   { tocarTom(220, 0.18, 0.05, 'sawtooth'); }
function tocarMatch() {
  if (!somAtivo) return;
  setTimeout(() => tocarTom(659, 0.12, 0.06), 0);
  setTimeout(() => tocarTom(880, 0.16, 0.06), 110);
}
function tocarSucesso() {
  if (!somAtivo) return;
  setTimeout(() => tocarTom(523, 0.15, 0.06), 0);
  setTimeout(() => tocarTom(659, 0.15, 0.06), 150);
  setTimeout(() => tocarTom(784, 0.25, 0.08), 300);
  setTimeout(() => tocarTom(1047, 0.4, 0.08), 500);
}

// === Web Speech API: pronúncia em inglês ===
let englishVoice = null;
function loadVoices() {
  const all = (window.speechSynthesis && speechSynthesis.getVoices()) || [];
  englishVoice = all.find(v => /en[-_]US/i.test(v.lang)) ||
                 all.find(v => /en[-_]GB/i.test(v.lang)) ||
                 all.find(v => /^en/i.test(v.lang)) ||
                 null;
}
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function falarIngles(texto) {
  if (!somAtivo || !texto) return;
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'en-US';
    u.rate = 0.85;
    u.pitch = 1.0;
    if (englishVoice) u.voice = englishVoice;
    speechSynthesis.speak(u);
  } catch (e) {}
}

// === Confete ===
const cores = ['#ee6c4d', '#2d6a7a', '#d4a35a', '#e8b4b8', '#5b9aab', '#f7c46c'];
function lancarConfete(qtd = 60) {
  for (let i = 0; i < qtd; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = cores[Math.floor(Math.random() * cores.length)];
      c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 25);
  }
}

// ============================================================
// ESTADO
// ============================================================
const estado = {
  vocab: null,        // 'faces' | 'weather' | 'mix'
  pairs: null,        // 6 | 8 | 'all'
  cards: [],          // array of { id, en, pt, emoji, type: 'word'|'emoji', matched: bool }
  flipped: [],        // ids de cartas atualmente viradas (max 2)
  matchedCount: 0,
  totalPairs: 0,
  moves: 0,
  startMs: 0,
  timerId: null,
  bloqueado: false,
};

function getVocabList(key) {
  if (key === 'faces')   return VOCAB_FACES.slice();
  if (key === 'weather') return VOCAB_WEATHER.slice();
  return VOCAB_FACES.concat(VOCAB_WEATHER);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// TELA INICIAL — seleção
// ============================================================
function setupSelectors() {
  document.querySelectorAll('#vocabGrid .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tocarClique();
      document.querySelectorAll('#vocabGrid .opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      estado.vocab = btn.dataset.vocab;
    });
  });
  document.querySelectorAll('#diffGrid .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tocarClique();
      document.querySelectorAll('#diffGrid .opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      estado.pairs = btn.dataset.pairs === 'all' ? 'all' : parseInt(btn.dataset.pairs, 10);
    });
  });
  // Pré-seleção amigável
  document.querySelector('#vocabGrid .opt-btn[data-vocab="faces"]').click();
  document.querySelector('#diffGrid .opt-btn[data-pairs="6"]').click();
}

// ============================================================
// CRIAR JOGO
// ============================================================
function iniciarJogo() {
  if (!estado.vocab || estado.pairs == null) return;
  const lista = shuffle(getVocabList(estado.vocab));
  const max = estado.pairs === 'all' ? lista.length : Math.min(estado.pairs, lista.length);
  const escolhidos = lista.slice(0, max);

  estado.cards = [];
  let id = 0;
  for (const v of escolhidos) {
    estado.cards.push({ id: id++, en: v.en, pt: v.pt, emoji: v.emoji, type: 'word',  matched: false });
    estado.cards.push({ id: id++, en: v.en, pt: v.pt, emoji: v.emoji, type: 'emoji', matched: false });
  }
  shuffle(estado.cards);
  estado.flipped = [];
  estado.matchedCount = 0;
  estado.totalPairs = escolhidos.length;
  estado.moves = 0;
  estado.startMs = Date.now();
  estado.bloqueado = false;

  renderBoard();
  atualizarHUD();
  iniciarTimer();
  showScreen('screenGame');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // Define quantidade de colunas de acordo com qtd de cartas
  const n = estado.cards.length;
  let cols = 4;
  if (n <= 12) cols = 4;
  else if (n <= 16) cols = 4;
  else if (n <= 20) cols = 5;
  else if (n <= 30) cols = 6;
  else cols = 6;
  if (window.innerWidth < 480) cols = Math.min(cols, 4);
  board.className = 'board cols-' + cols;
  board.style.setProperty('--cols', cols);

  for (const c of estado.cards) {
    const div = document.createElement('div');
    div.className = 'mcard';
    div.dataset.id = String(c.id);
    div.innerHTML = `
      <div class="mcard-inner">
        <div class="mcard-face mcard-front">
          <div class="pattern">EN</div>
          <div class="hint">${c.type === 'emoji' ? '👁️ imagem' : '📝 palavra'}</div>
        </div>
        <div class="mcard-face mcard-back">
          ${c.type === 'emoji'
            ? `<div class="emoji">${c.emoji}</div>`
            : `<span class="speaker">🔊</span><div class="word">${c.en}</div><div class="pt">${c.pt}</div>`}
        </div>
      </div>
    `;
    div.addEventListener('click', () => clicarCarta(c.id));
    board.appendChild(div);
  }
}

// ============================================================
// CLICK DE CARTA
// ============================================================
function clicarCarta(id) {
  if (estado.bloqueado) return;
  const carta = estado.cards.find(c => c.id === id);
  if (!carta || carta.matched) return;
  if (estado.flipped.includes(id)) return;
  if (estado.flipped.length >= 2) return;

  tocarClique();
  estado.flipped.push(id);
  const el = document.querySelector(`.mcard[data-id="${id}"]`);
  if (el) el.classList.add('flipped');

  // Se for carta de palavra, falar em inglês ao revelar
  if (carta.type === 'word') {
    setTimeout(() => falarIngles(carta.en), 250);
  }

  if (estado.flipped.length === 2) {
    estado.moves++;
    atualizarHUD();
    estado.bloqueado = true;
    const [aId, bId] = estado.flipped;
    const a = estado.cards.find(c => c.id === aId);
    const b = estado.cards.find(c => c.id === bId);

    if (a.en === b.en) {
      // MATCH
      setTimeout(() => {
        a.matched = true; b.matched = true;
        const elA = document.querySelector(`.mcard[data-id="${aId}"]`);
        const elB = document.querySelector(`.mcard[data-id="${bId}"]`);
        if (elA) { elA.classList.add('matched'); elA.classList.remove('flipped'); }
        if (elB) { elB.classList.add('matched'); elB.classList.remove('flipped'); }
        falarIngles(a.en);
        tocarMatch();
        estado.matchedCount++;
        estado.flipped = [];
        estado.bloqueado = false;
        atualizarHUD();
        if (estado.matchedCount === estado.totalPairs) {
          setTimeout(finalizar, 600);
        }
      }, 450);
    } else {
      // ERRO
      tocarErro();
      const elA = document.querySelector(`.mcard[data-id="${aId}"]`);
      const elB = document.querySelector(`.mcard[data-id="${bId}"]`);
      if (elA) elA.classList.add('bad');
      if (elB) elB.classList.add('bad');
      setTimeout(() => {
        if (elA) { elA.classList.remove('flipped'); elA.classList.remove('bad'); }
        if (elB) { elB.classList.remove('flipped'); elB.classList.remove('bad'); }
        estado.flipped = [];
        estado.bloqueado = false;
      }, 950);
    }
  }
}

// ============================================================
// HUD / TIMER
// ============================================================
function fmtTempo(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
}
function atualizarHUD() {
  document.getElementById('hudMoves').textContent = String(estado.moves);
  document.getElementById('hudPairs').textContent = String(estado.matchedCount);
  document.getElementById('hudTotal').textContent = String(estado.totalPairs);
}
function iniciarTimer() {
  pararTimer();
  estado.timerId = setInterval(() => {
    document.getElementById('hudTime').textContent = fmtTempo(Date.now() - estado.startMs);
  }, 500);
}
function pararTimer() {
  if (estado.timerId) { clearInterval(estado.timerId); estado.timerId = null; }
}

// ============================================================
// FINAL
// ============================================================
function finalizar() {
  pararTimer();
  const dur = Date.now() - estado.startMs;
  document.getElementById('finalTime').textContent  = fmtTempo(dur);
  document.getElementById('finalMoves').textContent = String(estado.moves);
  document.getElementById('finalPairs').textContent = String(estado.totalPairs);
  showScreen('screenFinal');
  tocarSucesso();
  lancarConfete(80);
  setTimeout(() => falarIngles('Excellent! You did it, Helena!'), 600);
}

// ============================================================
// NAVEGAÇÃO ENTRE TELAS
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// BIND DE BOTÕES
// ============================================================
document.getElementById('btnStart').addEventListener('click', () => {
  tocarClique();
  iniciarJogo();
});
document.getElementById('btnRestart').addEventListener('click', () => {
  tocarClique();
  iniciarJogo();
});
document.getElementById('btnBack').addEventListener('click', () => {
  tocarClique();
  pararTimer();
  showScreen('screenStart');
});
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  tocarClique();
  iniciarJogo();
});
document.getElementById('btnChange').addEventListener('click', () => {
  tocarClique();
  showScreen('screenStart');
});

// Sound toggle
const btnSom = document.getElementById('soundToggle');
btnSom.addEventListener('click', () => {
  somAtivo = !somAtivo;
  btnSom.textContent = somAtivo ? '🔊' : '🔇';
  if (!somAtivo && 'speechSynthesis' in window) speechSynthesis.cancel();
});

// Init
setupSelectors();
</script>
